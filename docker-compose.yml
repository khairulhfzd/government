version: "3.9"

services:
  # ─── Database MySQL ─────────────────────────────────────
  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: smartgov_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-pengaduan_db}
      MYSQL_USER: ${DB_USER:-govuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-govpass}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  # ─── Backend Express API ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartgov_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-pengaduan_db}
      DB_USER: ${DB_USER:-govuser}
      DB_PASSWORD: ${DB_PASSWORD:-govpass}
      JWT_SECRET: ${JWT_SECRET:-ganti_secret_ini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MAX_FILE_SIZE: 5242880
      UPLOAD_PATH: uploads/
    ports:
      - "5001:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend_net
      - frontend_net

  # ─── Frontend React ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartgov_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
    ports:
      - "3000:3000"
    networks:
      - frontend_net

volumes:
  db_data:
  uploads_data:

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
